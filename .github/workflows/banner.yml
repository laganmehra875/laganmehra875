name: Change Banner

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update-banner:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Change banner
        run: |
          banners=(images/banner1.gif images/banner2.gif images/banner3.gif images/banner4.gif images/banner5.gif)
          random=${banners[$RANDOM % ${#banners[@]}]}
          cp $random banner.gif

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add banner.gif
          git commit -m "update banner"
          git push
